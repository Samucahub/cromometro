version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: semstress-postgres
    restart: always
    environment:
      POSTGRES_USER: semstress
      POSTGRES_PASSWORD: semstress
      POSTGRES_DB: semstress
    ports:
      - "5432:5432"
    volumes:
      - semstress_pgdata:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: semstress-mailhog
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  semstress_pgdata:
